<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tennis Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1000, H = 600;
canvas.width = W; canvas.height = H;

// Colors
const COURT   = '#286e46';
const YELLOW  = '#d2f53c';
const WHITE   = '#ffffff';
const SHADOW  = '#145030';
const FRAME   = '#dc3232';
const FRAME_SHINE = '#ff8282';
const STR_MAIN  = '#e6e6b4';
const STR_CROSS = '#c8c88c';
const THROAT  = '#c82828';
const HANDLE  = '#a06428';
const GRIP_B  = '#232323';
const GRIP_A  = '#3c3c3c';
const BUTT    = '#505050';

// Racket geometry
const HEAD_W = 40, HEAD_H = 62;
const NECK_LEN = 18, HANDLE_LEN = 58, HANDLE_W = 10, GRIP_LEN = 28, FRAME_W = 5;
const SURF = 260, PIV = SURF / 2;
const HEAD_CX = PIV + HANDLE_LEN + NECK_LEN + HEAD_W / 2 - 4;

// Swing
const WINDUP_A = 65, STRIKE_A = -95;
const WINDUP_F = 5, STRIKE_F = 4, FOLLOW_F = 20;

function lerp(a,b,t){ return a+(b-a)*t; }
function easeOut(t){ return 1-Math.pow(1-t,3); }
function easeIn(t){ return t*t*t; }

function updateSwing(phase, angle, pt, sd){
  pt++;
  if(phase==='windup'){
    const t=Math.min(pt/WINDUP_F,1);
    angle=lerp(0, sd*WINDUP_A, easeIn(t));
    if(pt>=WINDUP_F){phase='strike';pt=0;}
  } else if(phase==='strike'){
    const t=Math.min(pt/STRIKE_F,1);
    angle=lerp(sd*WINDUP_A, sd*STRIKE_A, easeOut(t));
    if(pt>=STRIKE_F){phase='follow';pt=0;}
  } else if(phase==='follow'){
    const t=Math.min(pt/FOLLOW_F,1);
    angle=lerp(sd*STRIKE_A, 0, easeOut(t));
    if(pt>=FOLLOW_F){phase='idle';pt=0;angle=0;}
  } else {
    angle=0;
  }
  return {phase,angle,pt};
}

function drawEllipseStroke(ctx, cx, cy, rx, ry, color, lw){
  ctx.beginPath();
  ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.stroke();
}
function drawEllipseFill(ctx, cx, cy, rx, ry, color){
  ctx.beginPath();
  ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=color; ctx.fill();
}

function drawRacket(pivotX, pivotY, swingDeg, flip){
  const off = document.createElement('canvas');
  off.width = SURF; off.height = SURF;
  const c = off.getContext('2d');

  const px = PIV, py = PIV;
  const hcx = px + HANDLE_LEN + NECK_LEN + HEAD_W/2 - 4;
  const hcy = py;

  // head shadow
  c.globalAlpha = 0.2;
  drawEllipseFill(c, hcx+2, hcy+3, HEAD_W/2-1, HEAD_H/2-1, '#000');
  c.globalAlpha = 1;

  // frame (thick ellipse)
  for(let th=FRAME_W; th>=1; th--){
    const fac = 1 + th*0.02;
    drawEllipseStroke(c, hcx, hcy, HEAD_W/2 - FRAME_W + th, HEAD_H/2 - FRAME_W + th, FRAME, 2);
  }
  c.beginPath();
  c.ellipse(hcx,hcy,HEAD_W/2,HEAD_H/2,0,0,Math.PI*2);
  c.strokeStyle=FRAME; c.lineWidth=FRAME_W+1; c.stroke();
  // shine
  c.beginPath();
  c.ellipse(hcx,hcy,HEAD_W/2-1,HEAD_H/2-1,0,Math.PI*100/180,Math.PI*200/180);
  c.strokeStyle=FRAME_SHINE; c.lineWidth=2; c.stroke();

  // strings (clipped to head interior)
  c.save();
  c.beginPath();
  c.ellipse(hcx,hcy,HEAD_W/2-FRAME_W,HEAD_H/2-FRAME_W,0,0,Math.PI*2);
  c.clip();
  const iLeft = hcx-(HEAD_W/2-FRAME_W), iRight = hcx+(HEAD_W/2-FRAME_W);
  const iTop  = hcy-(HEAD_H/2-FRAME_W), iBot   = hcy+(HEAD_H/2-FRAME_W);
  const iW = iRight-iLeft, iH = iBot-iTop;
  c.strokeStyle=STR_MAIN; c.lineWidth=1;
  for(let i=1;i<8;i++){
    const sx=iLeft+i*iW/8;
    c.beginPath(); c.moveTo(sx,iTop+2); c.lineTo(sx,iBot-2); c.stroke();
  }
  c.strokeStyle=STR_CROSS;
  for(let i=1;i<10;i++){
    const sy=iTop+i*iH/10;
    c.beginPath(); c.moveTo(iLeft+2,sy); c.lineTo(iRight-2,sy); c.stroke();
  }
  c.restore();

  // throat Y
  const tx = hcx - HEAD_W/2;
  const te = tx - NECK_LEN;
  c.strokeStyle=THROAT; c.lineWidth=4;
  c.beginPath(); c.moveTo(tx,hcy-9); c.lineTo(te+2,hcy-3); c.stroke();
  c.beginPath(); c.moveTo(tx,hcy+9); c.lineTo(te+2,hcy+3); c.stroke();
  drawEllipseFill(c, te, hcy, 5, 5, THROAT);

  // handle
  const he = px;
  c.beginPath();
  c.moveTo(te, hcy-HANDLE_W/2-1);
  c.lineTo(he+4, hcy-HANDLE_W/2);
  c.lineTo(he, hcy-HANDLE_W/2+2);
  c.lineTo(he, hcy+HANDLE_W/2-2);
  c.lineTo(he+4, hcy+HANDLE_W/2);
  c.lineTo(te, hcy+HANDLE_W/2+1);
  c.closePath();
  c.fillStyle=HANDLE; c.fill();
  c.strokeStyle='#c89650'; c.lineWidth=1;
  c.beginPath(); c.moveTo(te-2,hcy-HANDLE_W/2+1); c.lineTo(he+6,hcy-HANDLE_W/2+1); c.stroke();

  // grip bands
  let gx=he+4; let tog=true;
  while(gx < he+4+GRIP_LEN){
    c.fillStyle=tog?GRIP_A:GRIP_B;
    c.fillRect(gx, hcy-HANDLE_W/2, 5, HANDLE_W);
    gx+=8; tog=!tog;
  }
  c.strokeStyle='#141414'; c.lineWidth=1;
  c.strokeRect(he+4, hcy-HANDLE_W/2, GRIP_LEN, HANDLE_W);

  // butt cap
  drawEllipseFill(c, he-3+4, hcy, 4, HANDLE_W/2+2, BUTT);
  drawEllipseStroke(c, he-3+4, hcy, 3, HANDLE_W/2+1, '#787878', 1);

  // now draw onto main canvas, rotated around pivot
  ctx.save();
  ctx.translate(pivotX, pivotY);
  ctx.rotate(swingDeg * Math.PI/180);
  if(flip){
    ctx.scale(-1,1);
  }
  // pivot is at (PIV, PIV) in the offscreen canvas
  ctx.drawImage(off, -PIV, -PIV);
  ctx.restore();
}

function getHeadCenter(pivotX, pivotY, swingDeg, flip){
  let dx = HEAD_CX - PIV;
  if(flip) dx = -dx;
  const rad = swingDeg * Math.PI/180;
  return {
    x: pivotX + dx*Math.cos(rad),
    y: pivotY + dx*Math.sin(rad)
  };
}

function hitboxCollide(pivotX, pivotY, swingDeg, flip, bx, by, br){
  const h = getHeadCenter(pivotX, pivotY, swingDeg, flip);
  return bx+br > h.x-22 && bx-br < h.x+22 && by+br > h.y-34 && by-br < h.y+34;
}

// Game state
let p1x=6, p1y=H/2, p2x=W-6, p2y=H/2;
let mx=W/4, my=H/2;
const AI_SPEED=16, MAX_SPEED=24, BALL_R=12;
let bx=W/2, by=H/2, bvx=6*(Math.random()<.5?1:-1), bvy=6*(Math.random()<.5?1:-1);
let s1=0, s2=0;

let p1phase='idle',p1angle=0,p1pt=0,p1dir=1;
let p2phase='idle',p2angle=0,p2pt=0,p2dir=1;

canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  mx=e.clientX-r.left; my=e.clientY-r.top;
  mx=Math.max(6,Math.min(W/2-100,mx));
  my=Math.max(40,Math.min(H-40,my));
});

function resetBall(){
  bx=W/2; by=H/2;
  bvx=6*(Math.random()<.5?1:-1);
  bvy=6*(Math.random()<.5?1:-1);
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

let lastMx=mx, lastMy=my;

function update(){
  const vx=mx-lastMx, vy=my-lastMy;
  const mspeed=Math.hypot(vx,vy);
  lastMx=p1x; lastMy=p1y;
  p1x=mx; p1y=my;
  const pvx=p1x-lastMx, pvy=p1y-lastMy;

  // AI
  const aiHeadX = p2x-92;
  if(bvx>0){
    let sx=bx,sy=by,svx=bvx,svy=bvy;
    for(let i=0;i<600;i++){
      sx+=svx; sy+=svy;
      if(sy-BALL_R<=0){sy=BALL_R;svy=Math.abs(svy);}
      if(sy+BALL_R>=H){sy=H-BALL_R;svy=-Math.abs(svy);}
      if(sx>=aiHeadX) break;
    }
    const dy=sy-p2y;
    if(Math.abs(dy)>2) p2y+=Math.min(AI_SPEED,Math.abs(dy))*(dy>0?1:-1);
  } else {
    const dy=H/2-p2y;
    if(Math.abs(dy)>2) p2y+=Math.min(AI_SPEED,Math.abs(dy))*(dy>0?1:-1);
  }
  p2y=clamp(p2y,40,H-40);

  // ball
  bx+=bvx; by+=bvy;
  if(by-BALL_R<=0){by=BALL_R;bvy=Math.abs(bvy);}
  if(by+BALL_R>=H){by=H-BALL_R;bvy=-Math.abs(bvy);}
  bvx=clamp(bvx,-MAX_SPEED,MAX_SPEED);
  bvy=clamp(bvy,-MAX_SPEED,MAX_SPEED);

  // collisions
  if(hitboxCollide(p1x,p1y,p1angle,false,bx,by,BALL_R) && bvx<0){
    const boost=1.06+(mspeed/8)*0.08;
    bvx=Math.abs(bvx)*boost;
    bvy+=pvy*0.3;
    p1dir=pvy>=0?1:-1;
    p1phase='windup'; p1angle=0; p1pt=0;
  }
  if(hitboxCollide(p2x,p2y,p2angle,true,bx,by,BALL_R) && bvx>0){
    const boost=1.05+(Math.abs(bvy)/10)*0.04;
    bvx=-Math.abs(bvx)*boost;
    p2dir=Math.random()<.5?1:-1;
    p2phase='windup'; p2angle=0; p2pt=0;
  }

  // swings
  let r1=updateSwing(p1phase,p1angle,p1pt,p1dir);
  p1phase=r1.phase; p1angle=r1.angle; p1pt=r1.pt;
  let r2=updateSwing(p2phase,p2angle,p2pt,p2dir);
  p2phase=r2.phase; p2angle=r2.angle; p2pt=r2.pt;

  // score
  if(bx<0){s2++;resetBall();}
  else if(bx>W){s1++;resetBall();}
}

function draw(){
  // court
  ctx.fillStyle=COURT; ctx.fillRect(0,0,W,H);

  // dashed center line
  ctx.fillStyle=WHITE;
  for(let y=0;y<H;y+=40) ctx.fillRect(W/2-2,y,4,20);

  // border
  ctx.strokeStyle=WHITE; ctx.lineWidth=6;
  ctx.strokeRect(3,3,W-6,H-6);

  // subtle left half tint
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fillRect(0,0,W/2,H);

  // rackets
  drawRacket(p1x,p1y,p1angle,false);
  drawRacket(p2x,p2y,p2angle,true);

  // ball shadow
  ctx.beginPath();
  ctx.ellipse(bx+5,by+BALL_R-4,BALL_R,BALL_R/2,0,0,Math.PI*2);
  ctx.fillStyle=SHADOW; ctx.fill();

  // ball
  ctx.beginPath();
  ctx.arc(bx,by,BALL_R,0,Math.PI*2);
  ctx.fillStyle=YELLOW; ctx.fill();
  // seam
  ctx.beginPath();
  ctx.arc(bx,by,BALL_R-3,Math.PI*20/180,Math.PI*160/180);
  ctx.strokeStyle='#aac814'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath();
  ctx.arc(bx,by,BALL_R-3,Math.PI*200/180,Math.PI*340/180);
  ctx.stroke();

  // score
  ctx.fillStyle=WHITE;
  ctx.font='bold 40px Arial';
  ctx.textAlign='center';
  ctx.fillText(`${s1}  ${s2}`, W/2, 50);

  // speed bar
  const spd=Math.abs(bvx);
  const bw=Math.floor((spd/MAX_SPEED)*80);
  ctx.strokeStyle='rgba(200,200,200,0.6)'; ctx.lineWidth=1;
  ctx.strokeRect(W/2-40,H-16,80,6);
  ctx.fillStyle=YELLOW;
  ctx.fillRect(W/2-40,H-16,bw,6);

  // hint
  ctx.fillStyle='rgba(180,230,180,0.8)';
  ctx.font='16px Arial';
  ctx.textAlign='left';
  ctx.fillText('Move mouse on left half', 10, H-8);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
